<!DOCTYPE html>
<html lang="en">

<head>

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-MY90CFN1R2"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());
        gtag('config', 'G-MY90CFN1R2');
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anima 2B Style Explorer</title>
    <meta name="description"
        content="Visual database of over 20,000 artist styles for the Anima 2B model. Compare Danbooru artists and copy optimized prompts.">

    <link rel="preconnect" href="https://cdn.statically.io">
    <link rel="dns-prefetch" href="https://cdn.statically.io">

    <link rel="stylesheet" href="app/style.css?v=22">
</head>

<body>

    <!-- Top Navigation Bar with Search -->
    <header class="top-nav">
        <a href="#" class="nav-left" style="text-decoration: none; color: inherit;">
            <h1 class="logo">Anima 2B</h1>
            <span class="logo-divider">/</span>
            <span class="logo-subtitle">Explorer</span>
        </a>

        <div class="nav-center">
            <div class="search-pill search-wrapper">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" class="search-icon">
                    <path
                        d="M21 21L15 15M17 10C17 13.866 13.866 17 10 17C6.13401 17 3 13.866 3 10C3 6.13401 6.13401 3 10 3C13.866 3 17 6.13401 17 10Z"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                </svg>
                <input type="text" id="search-input" class="search-input" placeholder="Search artist..."
                    aria-label="Search artist">
                <button id="clear-search-btn" class="clear-input-btn" aria-label="Clear search"
                    style="display: none;">&times;</button>
                <div class="input-divider"></div>

                <div class="jump-controls" style="display: flex; align-items: center;">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" class="jump-icon" stroke="currentColor"
                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 5V19M12 5L6 11M12 5L18 11" />
                    </svg>
                    <input type="number" id="jump-input" class="jump-input search-input" placeholder="Jump to rank..."
                        min="1" aria-label="Jump to numerical rank">
                    <button id="clear-jump-btn" class="clear-input-btn" aria-label="Clear jump"
                        style="display: none;">&times;</button>
                </div>
            </div>
        </div>

        <div class="nav-right">
            <a href="https://app.lava.top/products/17f881bc-a113-413a-9bde-9e59287f4dfb/eb748d4e-7c34-47fd-80fd-8ef86946ae85"
                class="support-btn" target="_blank" rel="noopener noreferrer">Support</a>
        </div>
    </header>

    <!-- Sorting, Filtering, and Display Controls -->
    <div id="controls-container" class="sub-header controls-container">

        <div class="sh-column sh-view">
            <h2 class="sh-title">View</h2>
            <div class="sh-links tabs">
                <a href="#" id="tab-gallery" class="sh-link active">All Profiles <span id="style-counter"
                        class="sh-count"></span></a>
                <a href="#/favorites" id="tab-favorites" class="sh-link">Favorites <span id="favorites-counter"
                        class="sh-count">0</span></a>
                <a href="about.html" class="sh-link">About & Info</a>
            </div>
        </div>

        <div class="sh-column sh-sort">
            <h2 class="sh-title">Sort</h2>
            <div class="sh-links sort-controls">
                <button id="sort-by-name" class="sh-link sort-button active" data-sort-by="name">Name <span
                        class="sort-arrow"></span></button>
                <button id="sort-by-uniqueness" class="sh-link sort-button" data-sort-by="uniqueness">Uniqueness <span
                        class="sort-arrow"></span></button>
                <button id="sort-by-works" class="sh-link sort-button" data-sort-by="works">Works <span
                        class="sort-arrow"></span></button>
                <button id="sort-by-random" class="sh-link sort-button" data-sort-by="random">Random <span
                        class="sort-arrow"></span></button>
                <button id="sort-by-date" class="sh-link sort-button" data-sort-by="date" style="display: none;">Date
                    Added <span class="sort-arrow"></span></button>
            </div>
        </div>

        <div class="sh-column sh-actions" id="txt-export-container" style="display: none;">
            <h2 class="sh-title">Actions</h2>
            <div class="sh-links">
                <button id="export-txt-btn" class="sh-link action-btn">Export Text List</button>
                <div id="favorites-controls-wrapper"
                    style="display: flex; flex-direction: column; align-items: flex-start; gap: 6px;">
                    <button id="import-favorites-btn" class="sh-link action-btn">Import JSON State</button>
                    <button id="save-favorites-btn" class="sh-link action-btn">Export JSON State</button>
                    <input type="file" id="import-favorites-input" accept=".json" style="display: none;">
                </div>
            </div>
        </div>

        <div class="sh-column sh-display">
            <h2 class="sh-title">Display</h2>
            <div class="sh-links">
                <div class="grid-slider-wrapper">
                    <span class="sh-label">Card Size</span>
                    <input type="range" id="grid-slider" min="1" max="5" value="3">
                </div>
            </div>
        </div>
    </div>

    <!-- Main UI: Dynamic Grid Gallery -->
    <main id="view-gallery" class="main-content view-section">

        <div id="toast-notification" aria-live="polite"></div>

        <button id="scroll-to-top" class="scroll-to-top" aria-label="Scroll to top">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 19V5M5 12l7-7 7 7" />
            </svg>
        </button>

        <div id="loader" class="loader-container">
            <div class="spinner"></div>
            <p>Loading dataset...</p>
        </div>

        <div id="gallery-container" class="gallery-grid"></div>
    </main>

    <!-- Secondary UI: Details Page (SPA routing) -->
    <main id="view-artist" class="main-content view-section hidden">
        <div class="details-page-header">
            <button id="details-back-btn" class="details-back-btn" aria-label="Go Back">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
                Back
            </button>
        </div>

        <div id="details-grid" class="gallery-grid">

            <div id="details-hero" class="details-hero">
                <img id="details-image" class="details-image" src="" alt="Artist Preview">
            </div>

            <div class="details-info-panel">
                <h2 id="details-artist-name">Artist Name</h2>
                <div class="details-subtitle"><span id="details-works-count">0</span> works</div>
                <div class="details-actions">
                    <button id="details-copy-btn" class="detail-action-btn primary">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                        </svg>
                        Copy Prompt
                    </button>
                    <button id="details-favorite-btn" class="detail-action-btn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <path
                                d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z">
                            </path>
                        </svg>
                        Favorite
                    </button>
                    <a id="details-danbooru-link" class="detail-action-btn nav-link" href="#" target="_blank"
                        rel="noopener noreferrer">
                        Danbooru ↗
                    </a>
                    <a id="details-gelbooru-link" class="detail-action-btn nav-link" href="#" target="_blank"
                        rel="noopener noreferrer">
                        Gelbooru ↗
                    </a>
                </div>
            </div>

        </div>
    </main>

    <script src="app/data.js?v=23"></script>
    <script src="app/app.js?v=23"></script>
</body>

</html>
